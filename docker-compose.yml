services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: campaign_manager
      POSTGRES_USER: campaign_manager
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U campaign_manager"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: campaign-manager:latest
    ports:
      - "${API_PORT:-8790}:8790"
    environment:
      API_PORT: ${API_PORT:-8790}
      DATABASE_URL: postgres://campaign_manager:${POSTGRES_PASSWORD:-changeme}@postgres:5432/campaign_manager
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:-}
      ARTIFACT_DIR: /app/data/artifacts
      CORS_ORIGINS: ${CORS_ORIGINS:-}
      MAX_UPLOAD_BYTES: ${MAX_UPLOAD_BYTES:-209715200}
      MAX_CONCURRENT_JOBS: ${MAX_CONCURRENT_JOBS:-3}
      DATA_DIR: /app/data
      ASR_PROVIDER: ${ASR_PROVIDER:-remote}
      OLLAMA_SSH_KEY: ${OLLAMA_SSH_KEY:-/root/.ssh/id_rsa}
      OLLAMA_SSH_USER: ${OLLAMA_SSH_USER:-root}
      OLLAMA_SSH_HOST: ${OLLAMA_SSH_HOST:-}
      WHISPER_MODEL: ${WHISPER_MODEL:-tiny}
      WHISPER_DEVICE: ${WHISPER_DEVICE:-cuda}
      WHISPER_CHUNK_SECONDS: ${WHISPER_CHUNK_SECONDS:-600}
      WHISPER_LOCAL_BASE: ${WHISPER_LOCAL_BASE:-}
      WHISPER_LOCAL_PATH: ${WHISPER_LOCAL_PATH:-/transcribe}
      WHISPER_LOCAL_MODEL: ${WHISPER_LOCAL_MODEL:-large-v3}
      WHISPER_LOCAL_API_KEY: ${WHISPER_LOCAL_API_KEY:-}
      WHISPER_LOCAL_API_KEY_HEADER: ${WHISPER_LOCAL_API_KEY_HEADER:-X-API-Key}
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      DIARIZATION_MODE: ${DIARIZATION_MODE:-auto}
      PYANNOTE_HF_TOKEN: ${PYANNOTE_HF_TOKEN:-}
      LLM_PROVIDER: ${LLM_PROVIDER:-ollama}
      LLM_MODEL: ${LLM_MODEL:-qwen2.5:7b}
      OLLAMA_BASE: ${OLLAMA_BASE:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
    volumes:
      - ./data:/app/data
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    # GPU passthrough — uncomment on your Docker box (requires NVIDIA Container Toolkit):
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: all
    #           capabilities: [gpu]

volumes:
  postgres_data:
