services:
  dnd-dashboard:
    build:
      context: .
      dockerfile: Dockerfile
    image: dnd-dashboard:latest
    ports:
      - "${API_PORT:-8790}:8790"
    environment:
      API_PORT: ${API_PORT:-8790}
      DATA_DIR: /app/data
      APP_TOKEN: ${APP_TOKEN:-}
      CORS_ORIGINS: ${CORS_ORIGINS:-}
      # ASR provider: remote | local | groq | openai
      ASR_PROVIDER: ${ASR_PROVIDER:-remote}
      OLLAMA_SSH_KEY: ${OLLAMA_SSH_KEY:-/root/.ssh/id_rsa}
      OLLAMA_SSH_USER: ${OLLAMA_SSH_USER:-root}
      OLLAMA_SSH_HOST: ${OLLAMA_SSH_HOST:-}
      WHISPER_MODEL: ${WHISPER_MODEL:-tiny}
      WHISPER_DEVICE: ${WHISPER_DEVICE:-cuda}
      WHISPER_CHUNK_SECONDS: ${WHISPER_CHUNK_SECONDS:-600}
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      GROQ_WHISPER_MODEL: ${GROQ_WHISPER_MODEL:-whisper-large-v3}
      ASR_API_CHUNK_BYTES: ${ASR_API_CHUNK_BYTES:-25165824}
      # Diarization
      DIARIZATION_MODE: ${DIARIZATION_MODE:-auto}
      PYANNOTE_HF_TOKEN: ${PYANNOTE_HF_TOKEN:-}
      # LLM
      LLM_PROVIDER: ${LLM_PROVIDER:-ollama}
      LLM_MODEL: ${LLM_MODEL:-qwen2.5:7b}
      OLLAMA_BASE: ${OLLAMA_BASE:-http://localhost:11434}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_BASE: ${OPENAI_BASE:-https://api.openai.com/v1}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      ANTHROPIC_BASE: ${ANTHROPIC_BASE:-https://api.anthropic.com/v1}
      # Job limits
      MAX_UPLOAD_BYTES: ${MAX_UPLOAD_BYTES:-209715200}
      MAX_CONCURRENT_JOBS: ${MAX_CONCURRENT_JOBS:-3}
      CAMPAIGN_DB_CACHE_MAX: ${CAMPAIGN_DB_CACHE_MAX:-10}
    volumes:
      - ./data:/app/data
    restart: unless-stopped
    # GPU passthrough — uncomment on your Docker box (requires NVIDIA Container Toolkit):
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: all
    #           capabilities: [gpu]